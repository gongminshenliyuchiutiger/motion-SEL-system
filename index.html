<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>體感SEL：社會情緒學習遊戲系統</title>
<!-- 引入 Font Awesome 圖標庫 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        /* 紫色賽博龐克色系定義 */
        --c-bg-dark: #050014;       
        --c-primary: #b026ff;       /* 主色：霓虹紫 */
        --c-secondary: #00f3ff;     /* 副色：賽博青 */
        --c-accent: #ff00ff;        /* 點綴：霓虹粉 */
        --c-danger: #ff2a2a;        /* 警告：紅 */
        --c-heal: #00ff9d;          /* 治療：螢光綠 */
        --c-grid: rgba(176, 38, 255, 0.15); 
    }

    body {
        margin: 0; background: var(--c-bg-dark); color: #fff;
        font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif; overflow: hidden;
        height: 100vh; width: 100vw; user-select: none;
    }

    /* 遊戲容器與畫布 */
    #game-wrapper { position: absolute; inset: 0; }
    #mirror-layer { position: absolute; inset: 0; transform: scaleX(-1); z-index: 1; }
    
    /* 遊戲層特效：增加一點外發光 */
    #game-canvas { position: absolute; inset: 0; z-index: 2; filter: drop-shadow(0 0 5px rgba(176, 38, 255, 0.2)); }

    /* 視訊層處理：濾鏡營造科技感 */
    video { 
        position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; 
        opacity: 0.6; filter: contrast(1.2) brightness(0.8) hue-rotate(20deg); 
    }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* 背景網格動畫 */
    .grid-bg {
        position: absolute; inset: 0; z-index: 0;
        background-image: linear-gradient(var(--c-grid) 1px, transparent 1px),
                          linear-gradient(90deg, var(--c-grid) 1px, transparent 1px);
        background-size: 60px 60px; pointer-events: none;
        box-shadow: inset 0 0 100px #000;
    }

    /* UI 層 */
    #ui-layer {
        position: absolute; inset: 0; z-index: 10; pointer-events: none;
        display: flex; flex-direction: column; justify-content: space-between;
    }

    /* 頂部資訊列 */
    #top-bar {
        padding: 20px; display: flex; justify-content: space-between; align-items: center;
        background: linear-gradient(to bottom, rgba(30,0,60,0.9), transparent);
        font-weight: bold; font-size: 24px; text-shadow: 0 0 10px var(--c-primary);
        border-bottom: 1px solid rgba(176, 38, 255, 0.3);
        opacity: 0; transition: 0.5s; pointer-events: auto;
    }
    .left-group { display: flex; gap: 20px; align-items: center; }
    .score-box { color: var(--c-secondary); display: flex; gap: 10px; align-items: center; }
    .score-val { font-size: 32px; color: #fff; font-family: 'Courier New', monospace; text-shadow: 0 0 15px var(--c-secondary); }
    
    .lives-box { color: var(--c-accent); display: flex; gap: 5px; filter: drop-shadow(0 0 5px var(--c-accent)); }
    .heart { animation: beat 1.5s infinite; transition: transform 0.2s; }
    .heart.gained { animation: pop-heart 0.5s ease-out; color: var(--c-heal); } 
    
    @keyframes beat { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; } }
    @keyframes pop-heart { 0% { transform: scale(1); } 50% { transform: scale(2.0); } 100% { transform: scale(1); } }

    #sound-btn {
        background: rgba(176, 38, 255, 0.2);
        border: 1px solid var(--c-primary);
        color: #fff; padding: 5px 10px; border-radius: 5px;
        cursor: pointer; font-size: 18px; transition: 0.3s;
    }
    #sound-btn:hover { background: var(--c-primary); box-shadow: 0 0 15px var(--c-primary); }

    /* --- 新版 HUD 啟動面板樣式 --- */
    .panel-hud {
        position: absolute; top: 50%; left: 50%; 
        transform: translate(-50%, -50%);
        width: 90%; max-width: 650px;
        background: rgba(10, 5, 20, 0.85); /* 深邃背景 */
        border: 1px solid rgba(176, 38, 255, 0.3);
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 0 50px rgba(176, 38, 255, 0.2), inset 0 0 100px rgba(0,0,0,0.8);
        backdrop-filter: blur(15px);
        text-align: center;
        z-index: 20; pointer-events: auto;
        /* 賽博龐克切角 */
        clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
    }
    /* 角落裝飾線 */
    .panel-hud::before, .panel-hud::after {
        content: ''; position: absolute; width: 30px; height: 30px;
        border: 3px solid var(--c-secondary); transition: 0.3s; pointer-events: none;
    }
    .panel-hud::before { top: 0; left: 0; border-right: none; border-bottom: none; }
    .panel-hud::after { bottom: 0; right: 0; border-left: none; border-top: none; }

    .hud-title {
        font-size: clamp(2rem, 5vw, 3.5rem); margin: 0 0 10px 0; text-transform: uppercase;
        background: linear-gradient(135deg, #fff 0%, var(--c-secondary) 50%, var(--c-primary) 100%);
        -webkit-background-clip: text; color: transparent;
        text-shadow: 0 0 20px rgba(176, 38, 255, 0.6); letter-spacing: 2px;
    }
    .hud-subtitle { color: #aaa; font-size: 1.1rem; margin-bottom: 30px; letter-spacing: 1px; }

    /* 卡片式說明區 */
    .cards-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 30px; }
    .info-card {
        background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
        padding: 15px 10px; border-radius: 8px;
        display: flex; flex-direction: column; align-items: center; gap: 10px; transition: 0.3s;
    }
    .info-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); }
    .info-card i { font-size: 2rem; margin-bottom: 5px; }
    .info-card h3 { margin: 0; font-size: 1rem; color: #fff; }
    .info-card span { font-size: 0.85rem; opacity: 0.8; }

    .card-bad { border-bottom: 3px solid var(--c-danger); }
    .card-bad i { color: var(--c-danger); filter: drop-shadow(0 0 5px var(--c-danger)); }
    
    .card-super { border-bottom: 3px solid var(--c-primary); }
    .card-super i { color: var(--c-primary); filter: drop-shadow(0 0 5px var(--c-primary)); }
    
    .card-heal { border-bottom: 3px solid var(--c-heal); }
    .card-heal i { color: var(--c-heal); filter: drop-shadow(0 0 8px var(--c-heal)); animation: beat 1s infinite; }

    .hud-tip {
        color: var(--c-heal); font-size: 0.95rem; margin-bottom: 30px;
        background: rgba(0, 255, 157, 0.05); padding: 8px 15px;
        border-radius: 50px; border: 1px solid rgba(0, 255, 157, 0.2);
        display: inline-block;
    }

    /* 升級版按鈕 */
    .btn-cyber {
        position: relative; background: var(--c-primary);
        color: #fff; font-size: 1.5rem; font-weight: bold;
        padding: 15px 60px; border: none; cursor: pointer;
        clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
        transition: 0.3s; overflow: hidden;
        box-shadow: 0 0 30px rgba(176, 38, 255, 0.5);
    }
    .btn-cyber::before {
        content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
        transform: skewX(-20deg); animation: shine 3s infinite;
    }
    @keyframes shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
    .btn-cyber:hover { transform: scale(1.05); background: #d600ff; box-shadow: 0 0 50px var(--c-primary); }
    .btn-cyber:active { transform: scale(0.95); }

    /* Game Over 畫面樣式 (共用部分) */
    .game-over-content { text-align: center; }
    .tip-box {
        margin-top: 20px; padding: 15px;
        background: rgba(255, 255, 255, 0.1);
        border-left: 4px solid var(--c-secondary);
        font-size: 0.95rem; color: #eee; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto;
    }

    .hidden { display: none !important; }

    .mascot-container {
        position: absolute; bottom: 40px; left: 20px;
        width: 140px; height: auto;
        z-index: 100; pointer-events: auto;
        cursor: grab; user-select: none;
        transition: transform 0.1s;
    }
    .mascot-container img { width: 100%; display: block; filter: drop-shadow(0 0 5px var(--c-primary)); }
    .mascot-container:hover img { animation: neon-pulse 1.5s infinite ease-in-out; }
    @keyframes neon-pulse { 0% { filter: drop-shadow(0 0 5px var(--c-primary)); } 50% { filter: drop-shadow(0 0 15px var(--c-accent)); } 100% { filter: drop-shadow(0 0 5px var(--c-primary)); } }

    .footer {
        position: absolute; bottom: 10px; width: 100%;
        text-align: center; color: rgba(255, 255, 255, 0.4);
        font-size: 12px; pointer-events: none; z-index: 25;
    }

    /* 新增：壓力狀態濾鏡 */
    #pressure-vignette {
        position: absolute; inset: 0; z-index: 5;
        background: radial-gradient(circle, transparent 60%, rgba(255, 0, 0, 0.4) 100%);
        pointer-events: none; opacity: 0; transition: 0.5s;
    }
    .under-pressure #pressure-vignette { opacity: 1; animation: red-pulse 1s infinite alternate; }
    @keyframes red-pulse { from { opacity: 0.3; } to { opacity: 0.7; } }

    /* 心情簽到按鈕樣式 */
    .mood-container { display: flex; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
    .mood-btn {
        background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.3s;
        display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100px;
    }
    .mood-btn:hover { background: var(--c-primary); transform: translateY(-5px); box-shadow: 0 0 20px var(--c-primary); }
    .mood-btn i { font-size: 2rem; }
    .mood-btn span { font-size: 0.9rem; }

    /* 情境文字樣式 */
    #scenario-ui {
        position: absolute; top: 150px; left: 50%; transform: translateX(-50%);
        text-align: center; z-index: 15; width: 80%; pointer-events: none;
    }
    .scenario-title { font-size: 1.5rem; color: var(--c-secondary); text-shadow: 0 0 10px var(--c-secondary); margin-bottom: 20px; }

    /* 靜心區樣式 */
    .mindfulness-ring {
        position: absolute; border: 4px solid var(--c-heal); border-radius: 50%;
        box-shadow: 0 0 20px var(--c-heal); animation: mindfulness-pulse 2s infinite;
        display: flex; align-items: center; justify-content: center;
    }
    @keyframes mindfulness-pulse { 0% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.6; } }
    .mindfulness-progress {
        position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
        width: 100px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px; overflow: hidden;
    }
    .mindfulness-bar { height: 100%; background: var(--c-heal); width: 0%; transition: width 0.1s linear; }

    @media (max-width: 768px) {
        .panel-hud { width: 90%; padding: 25px 15px; }
        .cards-container { grid-template-columns: 1fr; gap: 10px; }
        .info-card { flex-direction: row; padding: 10px 20px; justify-content: flex-start; }
        .info-card i { font-size: 1.5rem; margin: 0 15px 0 0; }
        .hud-title { font-size: 1.8rem; }
        #top-bar { padding: 10px 15px; flex-direction: row; flex-wrap: wrap; }
        .mascot-container { width: 100px; bottom: 35px; left: 10px; }
        .mood-btn { width: 80px; padding: 10px; }
    }
</style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <div id="pressure-vignette"></div>
    <div id="game-wrapper">
        <div id="mirror-layer">
            <video id="vid" autoplay playsinline muted></video>
            <canvas id="motion-cvs"></canvas>
        </div>
        <canvas id="game-canvas"></canvas>
    </div>
    
    <div id="ui-layer">
        <div id="top-bar">
            <div class="left-group">
                <button id="sound-btn" onclick="toggleMute()"><i class="fas fa-volume-up"></i></button>
                <div class="score-box">
                    <i class="fas fa-seedling"></i> 情緒力：<span class="score-val" id="scoreDisplay">0</span>
                </div>
            </div>
            <div class="lives-box" id="livesDisplay">
                <i class="fas fa-heart heart"></i><i class="fas fa-heart heart"></i><i class="fas fa-heart heart"></i>
            </div>
        </div>

        <div id="mascot" class="mascot-container" title="LiyuChillGuy">
            <img src="image/LiyuChillGuy.svg" draggable="false" 
                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712109.png'" 
                 alt="LiyuChillGuy">
        </div>

        <div class="footer">Copyright © Liyuchiutiger Gongminshen</div>

        <!-- 情境 UI -->
        <div id="scenario-ui" class="hidden">
            <div class="scenario-title" id="scenario-text">情境提示文字</div>
        </div>

        <!-- 啟動畫面 (New HUD Design) -->
        <div class="panel-hud" id="start-panel">
            <h1 class="hud-title">體感SEL：<br>社會情緒學習遊戲系統</h1>
            <p class="hud-subtitle">SOCIAL EMOTIONAL LEARNING INTERACTIVE</p>
            
            <div class="cards-container">
                <!-- 地雷卡片 -->
                <div class="info-card card-bad">
                    <i class="fas fa-skull-crossbones"></i>
                    <div>
                        <h3>紅色警戒</h3>
                        <span style="color:#aaa">情緒失控 (-1命)</span>
                    </div>
                </div>
                
                <!-- 知識卡片 -->
                <div class="info-card card-super">
                    <i class="fas fa-seedling"></i>
                    <div>
                        <h3>紫色能量</h3>
                        <span style="color:#aaa">情緒管理 (+分)</span>
                    </div>
                </div>
                
                <!-- 補血卡片 -->
                <div class="info-card card-heal">
                    <i class="fas fa-heart"></i>
                    <div>
                        <h3>綠色救援</h3>
                        <span style="color:#aaa">情緒修復 (+1命)</span>
                    </div>
                </div>
            </div>

            <div class="hud-tip">
                <i class="fas fa-exclamation-circle"></i> 戰術提示：看到 <span style="font-weight:bold; color:#fff;">💖</span> 不用猶豫，直接碰觸補血！
            </div>
            
            <br>
            <button class="btn-cyber" id="start-btn" onclick="showCheckin()">啟動連結 START</button>
        </div>

        <!-- 心情簽到面板 -->
        <div class="panel-hud hidden" id="checkin-panel">
            <h1 class="hud-title">今日心情簽到</h1>
            <p class="hud-subtitle">你好！在開始情緒管理練習前，此刻你的心情是？</p>
            <div class="mood-container">
                <div class="mood-btn" onclick="initGame('happy')">
                    <i class="fas fa-laugh-beam" style="color:#ffeb3b"></i>
                    <span>開心</span>
                </div>
                <div class="mood-btn" onclick="initGame('calm')">
                    <i class="fas fa-smile-beam" style="color:#4caf50"></i>
                    <span>平靜</span>
                </div>
                <div class="mood-btn" onclick="initGame('tired')">
                    <i class="fas fa-tired" style="color:#9e9e9e"></i>
                    <span>疲憊</span>
                </div>
                <div class="mood-btn" onclick="initGame('anxious')">
                    <i class="fas fa-flushed" style="color:#ff9800"></i>
                    <span>焦慮</span>
                </div>
                <div class="mood-btn" onclick="initGame('angry')">
                    <i class="fas fa-angry" style="color:#f44336"></i>
                    <span>生氣</span>
                </div>
            </div>
        </div>

        <!-- 遊戲結束畫面 -->
        <div class="panel-hud hidden" id="game-over-panel">
            <h1 class="hud-title" style="color: var(--c-danger);">SYSTEM FAILURE</h1>
            <div class="game-over-content">
                <p>本次情緒力積分結算</p>
                <h2 style="font-size: 4rem; margin: 0 0 20px; color: #fff; text-shadow: 0 0 20px var(--c-primary);" id="final-score">0</h2>
                <div id="rank-text" style="color: var(--c-secondary); font-size: 1.3rem; margin-bottom: 20px; font-weight:bold;"></div>
                
                <div class="tip-box">
                    <strong><i class="fas fa-lightbulb"></i> SEL小教室：</strong><br>
                    <span id="knowledge-tip"></span>
                </div>
                <br>
                <button class="btn-cyber" onclick="restartGame()">重啟系統 RESTART</button>
            </div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const vid = $('vid');
        const mCvs = $('motion-cvs'), mCtx = mCvs.getContext('2d');
        const gCvs = $('game-canvas'), gCtx = gCvs.getContext('2d');
        const tmpCvs = document.createElement('canvas'), tmpCtx = tmpCvs.getContext('2d', { willReadFrequently: true });
        
        // --- 吉祥物拖曳 ---
        const mascot = $('mascot');
        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        const startDrag = (e) => {
            isDragging = true;
            const clientX = e.clientX || e.touches[0].clientX;
            const clientY = e.clientY || e.touches[0].clientY;
            const rect = mascot.getBoundingClientRect();
            startX = clientX; startY = clientY;
            initialLeft = rect.left; initialTop = rect.top;
            mascot.style.bottom = 'auto'; mascot.style.right = 'auto';
            mascot.style.left = initialLeft + 'px'; mascot.style.top = initialTop + 'px';
        };
        const onDrag = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const clientX = e.clientX || e.touches[0].clientX;
            const clientY = e.clientY || e.touches[0].clientY;
            mascot.style.left = (initialLeft + (clientX - startX)) + 'px';
            mascot.style.top = (initialTop + (clientY - startY)) + 'px';
        };
        const stopDrag = () => { isDragging = false; };
        mascot.addEventListener('mousedown', startDrag);
        mascot.addEventListener('touchstart', startDrag, {passive: false});
        window.addEventListener('mousemove', onDrag);
        window.addEventListener('touchmove', onDrag, {passive: false});
        window.addEventListener('mouseup', stopDrag);
        window.addEventListener('touchend', stopDrag);

        // --- 遊戲資料庫 (教育內容) ---
        const GAME_DATA = {
            heal: [ // 【直接補血項目】
                { t: "深呼吸", i: "🧘" }, { t: "自我接納", i: "💖" }, 
                { t: "尋求幫助", i: "🤝" }, { t: "情緒轉念", i: "🌈" } 
            ],
            super: [ // 高分
                { t: "自我察覺", i: "💡" }, { t: "同理心", i: "🫂" }, 
                { t: "正向溝通", i: "🗣️" }, { t: "壓力調適", i: "🍃" }
            ],
            rare: [ // 中分
                { t: "換位思考", i: "🔄" }, { t: "感恩之心", i: "🙏" }, 
                { t: "主動傾聽", i: "👂" }, { t: "衝突解決", i: "⚖️" }
            ],
            bad: [ // 直接扣命 (行為)
                { t: "言語攻擊", i: "🗡️" }, { t: "逃避問題", i: "🏃" }, 
                { t: "衝動行事", i: "⚡" }, { t: "人際衝突", i: "🥊" }
            ],
            emotion: [ // 自然情緒 (進入壓力狀態)
                { t: "感到憤怒", i: "🌋" }, { t: "陷入焦慮", i: "😰" },
                { t: "覺得失落", i: "🥀" }, { t: "產生壓力", i: "💢" }
            ],
            scenarios: [
                { 
                    q: "朋友未經同意拿走你的東西", 
                    ok: { t: "平靜地請他歸還", i: "💬", v: 100 }, 
                    no: { t: "立刻對他吼叫", i: "📢", v: -1 } 
                },
                { 
                    q: "比賽輸了感到很不甘心", 
                    ok: { t: "肯定自己的努力", i: "👏", v: 100 }, 
                    no: { t: "亂摔東西發洩", i: "💢", v: -1 } 
                },
                { 
                    q: "被老師誤會心情很糟糕", 
                    ok: { t: "找機會理性說明", i: "⚖️", v: 100 }, 
                    no: { t: "當眾出言頂撞", i: "🔥", v: -1 } 
                }
            ],
            tips: [ 
                "當感到生氣或焦慮時，試著「深呼吸」數到十，可以幫助大腦冷靜並穩定情緒。",
                "每個人都會犯錯，學會「自我接納」是不斷進步與成長的關鍵。",
                "嘗試站在對方的角度「換位思考」，有助於減少誤會並增進同理心。",
                "遇到無法解決的困難時，勇敢「尋求幫助」也是一種負責任的決策表現！",
                "良好的「主動傾聽」不僅是聽見別人的話，更是去理解對方的感受與需求。"
            ]
        };

        // --- 遊戲狀態與統計 ---
        let gameState = 'START'; 
        let initialMood = '';
        let stats = { transformed: 0, mindfulness: 0, scenarios: 0, heals: 0 };

        let isUnderPressure = false;
        let pressureTimer = 0;
        let scenarioActive = false;
        let currentScenario = null;
        let mindfulnessZone = null;
        let nextScenarioScore = 600;
        let lastMindfulnessScore = 0;

        // --- 遊戲邏輯變數 ---
        let w, h, ch;
        let prevData = null;
        let gameActive = false;
        let score = 0;
        let lives = 3;
        const MAX_LIVES = 5; 
        let nextLifeScore = 1500; 
        let items = []; 
        let particles = [];
        let floatingTexts = []; 
        let motionPoints = []; 
        let animationFrameId;

        class SoundManager {
            constructor() { this.ctx = null; this.muted = false; this.masterGain = null; }
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.ctx.createGain();
                    this.masterGain.gain.value = 0.3; 
                    this.masterGain.connect(this.ctx.destination);
                } else if (this.ctx.state === 'suspended') this.ctx.resume();
            }
            toggleMute() {
                this.muted = !this.muted;
                $('sound-btn').innerHTML = this.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
                if(this.masterGain) this.masterGain.gain.setValueAtTime(this.muted ? 0 : 0.3, this.ctx.currentTime);
            }
            playTone(freq, type, dur, slideTo = null, vol = 0.5) {
                if (!this.ctx || this.muted) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                if (slideTo) osc.frequency.linearRampToValueAtTime(slideTo, this.ctx.currentTime + dur);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                osc.connect(gain); gain.connect(this.masterGain);
                osc.start(); osc.stop(this.ctx.currentTime + dur);
            }
            playStart() { this.playTone(220, 'sawtooth', 0.1); setTimeout(() => this.playTone(880, 'sine', 0.6), 100); }
            playGood() { this.playTone(880, 'sine', 0.1, 1200); }
            playRare() { this.playTone(1200, 'square', 0.1, 1800, 0.2); }
            playSuper() { 
                this.playTone(400, 'sawtooth', 0.1); 
                setTimeout(() => this.playTone(600, 'sawtooth', 0.1), 100); 
                setTimeout(() => this.playTone(1200, 'square', 0.4), 200); 
            }
            playBad() { this.playTone(150, 'sawtooth', 0.4, 50); } 
            playHeal() { // 吃到愛心的音效
                this.playTone(400, 'sine', 0.1); 
                setTimeout(() => this.playTone(600, 'sine', 0.1), 100);
                setTimeout(() => this.playTone(800, 'sine', 0.4, 1200), 200);
            } 
            playPowerUp() { 
                this.playTone(500, 'square', 0.1, 800); 
                setTimeout(() => this.playTone(800, 'square', 0.3, 1500), 100);
            }
            playGameOver() { 
                this.playTone(300, 'sawtooth', 0.4, 100); 
                setTimeout(() => this.playTone(100, 'sawtooth', 1.0), 400); 
            }
        }
        const sfx = new SoundManager();

        const CFG = { cw: 64, thresh: 20, spawnRate: 15, gravity: 4.5, hitRadius: 50 };

        class MindfulnessZone {
            constructor() {
                this.x = w / 2;
                this.y = h / 3;
                this.r = 120;
                this.progress = 0;
                this.active = true;
                this.completed = false;
            }
            update() {
                let inZone = false;
                for (let mp of motionPoints) {
                    if ((this.x - mp.x)**2 + (this.y - mp.y)**2 < this.r**2) { inZone = true; break; }
                }
                if (inZone) {
                    this.progress += 0.015;
                    if (this.progress >= 1) { this.completed = true; this.active = false; }
                } else {
                    this.progress = Math.max(0, this.progress - 0.005);
                }
            }
            draw(ctx) {
                ctx.save();
                ctx.beginPath();
                ctx.strokeStyle = varColor('--c-heal');
                ctx.lineWidth = 5;
                ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
                ctx.stroke();
                
                // 畫進度條背景
                ctx.fillStyle = "rgba(255,255,255,0.2)";
                ctx.fillRect(this.x - 50, this.y + this.r + 20, 100, 10, 5);
                // 畫進度
                ctx.fillStyle = varColor('--c-heal');
                ctx.fillRect(this.x - 50, this.y + this.r + 20, 100 * this.progress, 10, 5);
                
                ctx.font = "bold 24px 'Microsoft JhengHei'";
                ctx.textAlign = "center";
                ctx.fillStyle = "#fff";
                ctx.fillText("✨ 深呼吸靜心區 ✨", this.x, this.y - this.r - 20);
                ctx.fillText("手臂停留在區域內冷靜", this.x, this.y);
                ctx.restore();
            }
        }

        const varColor = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

        class Item {
            constructor(specific = null) {
                this.r = Math.random();
                this.type = ''; this.icon = ''; this.color = '#fff'; this.text = '';
                
                if (specific) {
                    this.type = specific.type;
                    this.icon = specific.icon;
                    this.text = specific.text;
                    this.color = specific.color || '#fff';
                    this.val = specific.val || 0;
                    this.speed = specific.speed || CFG.gravity;
                    this.glow = specific.glow || false;
                } else {
                    // 動態機率：壓力狀態下只掉落補血與高分項 (情緒轉化)
                    let healChance = isUnderPressure ? 0.35 : (lives <= 1 ? 0.15 : 0.05);

                    if (this.r > (1.0 - healChance)) { 
                        this.type = 'heal'; this.val = 0; 
                        const d = GAME_DATA.heal[Math.floor(Math.random()*GAME_DATA.heal.length)];
                        this.icon = d.i; this.text = d.t;
                        this.color = '#00ff9d';
                        this.speed = CFG.gravity * 1.5;
                        this.glow = true;
                    }
                    else if (this.r > 0.88) { // 高分
                        this.type = 'super'; this.val = 150; 
                        const d = GAME_DATA.super[Math.floor(Math.random()*GAME_DATA.super.length)];
                        this.icon = d.i; this.text = d.t;
                        this.color = '#b026ff'; 
                        this.speed = CFG.gravity * 1.8; 
                        this.glow = true;
                    }
                    else if (this.r > 0.78) { // 情緒項 (進入壓力狀態)
                        this.type = 'emotion'; this.val = 0;
                        const d = GAME_DATA.emotion[Math.floor(Math.random()*GAME_DATA.emotion.length)];
                        this.icon = d.i; this.text = d.t;
                        this.color = '#ff9800'; // 橘色警告
                        this.speed = CFG.gravity * 0.9;
                        this.glow = true;
                    }
                    else if (this.r > 0.65) { // 直接扣命 (行為)
                        this.type = 'bad'; this.val = -1; 
                        const d = GAME_DATA.bad[Math.floor(Math.random()*GAME_DATA.bad.length)];
                        this.icon = d.i; this.text = d.t;
                        this.color = '#ff2a2a'; 
                        this.speed = CFG.gravity * 1.0; 
                        this.glow = false;
                    }
                    else { // 普通/常態
                        this.type = 'normal'; this.val = 20; 
                        this.icon = '🤝'; this.text = '互助';
                        this.color = '#ffffff'; 
                        this.speed = CFG.gravity * 1.1; 
                        this.glow = false;
                    }
                }
                
                this.size = 55; 
                this.x = Math.random() * (w - 100) + 50;
                this.y = -70;
                this.active = true;
                this.angle = 0;
                this.rotSpeed = (Math.random() - 0.5) * 0.05;
            }
            update() { this.y += this.speed; this.angle += this.rotSpeed; if (this.y > h+50) this.active = false; }
            draw(ctx) {
                ctx.save(); 
                ctx.translate(this.x, this.y); 

                if (this.glow || this.type === 'heal') {
                    ctx.shadowBlur = this.type === 'heal' ? 30 : 20; 
                    ctx.shadowColor = this.color;
                }

                ctx.save();
                ctx.rotate(this.angle);
                
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                if (this.type === 'bad') ctx.rect(-25, -25, 50, 50);
                else ctx.arc(0, 0, 30, 0, Math.PI*2);
                ctx.stroke();

                ctx.font = `${this.size}px Arial`; 
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillStyle = "#fff";
                ctx.fillText(this.icon, 0, 4);
                ctx.restore(); 

                ctx.shadowBlur = 0; 
                ctx.font = "bold 20px 'Microsoft JhengHei'";
                ctx.textAlign = "center"; ctx.textBaseline = "top";
                ctx.fillStyle = this.color;
                ctx.lineWidth = 4; ctx.lineJoin = "round"; ctx.strokeStyle = "rgba(0,0,0,0.9)";
                
                const textY = 40;
                ctx.strokeText(this.text, 0, textY);
                ctx.fillText(this.text, 0, textY);
                ctx.restore(); 
            }
        }

        class FloatingText {
            constructor(x, y, text, color, size) {
                this.x = x; this.y = y; this.text = text; this.color = color;
                this.life = 1.0; this.vy = -3; this.size = size;
            }
            update() { this.y += this.vy; this.life -= 0.02; }
            draw(ctx) {
                ctx.save(); ctx.globalAlpha = Math.max(0, this.life);
                ctx.font = `bold ${this.size}px 'Microsoft JhengHei', sans-serif`;
                ctx.textAlign = "center"; 
                ctx.shadowColor = this.color; ctx.shadowBlur = 10;
                
                const lines = this.text.split('\n');
                lines.forEach((line, i) => {
                    ctx.strokeStyle = "black"; ctx.lineWidth = 4;
                    ctx.strokeText(line, this.x, this.y + (i * this.size * 1.1));
                    ctx.fillStyle = this.color;
                    ctx.fillText(line, this.x, this.y + (i * this.size * 1.1));
                });
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vx = (Math.random()-0.5)*15; this.vy = (Math.random()-0.5)*15; this.life = 1;
                this.size = Math.random() * 6 + 2;
            }
            update() { this.x+=this.vx; this.y+=this.vy; this.life-=0.04; }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                if (Math.random() > 0.5) ctx.fillRect(this.x, this.y, this.size, this.size); 
                else { ctx.beginPath(); ctx.arc(this.x, this.y, this.size/2, 0, Math.PI*2); ctx.fill(); }
                ctx.restore();
            }
        }

        const resize = () => {
            w = window.innerWidth; h = window.innerHeight;
            [mCvs, gCvs].forEach(c => { c.width = w; c.height = h; });
            if (vid.videoWidth) {
                ch = Math.floor(CFG.cw * (vid.videoHeight / vid.videoWidth));
                tmpCvs.width = CFG.cw; tmpCvs.height = ch;
            }
        };
        window.onresize = resize;

        function showCheckin() {
            $('start-panel').classList.add('hidden');
            $('checkin-panel').classList.remove('hidden');
        }

        async function initGame(mood) {
            if (mood) initialMood = mood;
            sfx.init(); sfx.playStart();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width:1280, height:720 }, audio: false });
                vid.srcObject = stream;
                vid.onloadedmetadata = () => { vid.play(); resize(); startGameLoop(); };
            } catch (e) { alert("無法開啟攝影機，請檢查瀏覽器權限或使用其他裝置。"); }
        }

        function startGameLoop() {
            $('start-panel').classList.add('hidden');
            $('checkin-panel').classList.add('hidden');
            $('game-over-panel').classList.add('hidden');
            document.body.classList.remove('under-pressure');
            $('scenario-ui').classList.add('hidden');

            $('top-bar').style.opacity = 1;
            score = 0; lives = 3; nextLifeScore = 1500;
            items = []; particles = []; floatingTexts = [];
            stats = { transformed: 0, mindfulness: 0, scenarios: 0, heals: 0 };
            
            isUnderPressure = false;
            scenarioActive = false;
            mindfulnessZone = null;
            nextScenarioScore = 600;
            lastMindfulnessScore = 0;
            
            CFG.spawnRate = 15;
            updateUI(); 
            gameState = 'PLAYING';
            gameActive = true; 
            loop();
        }

        function restartGame() { 
            gameState = 'START';
            $('game-over-panel').classList.add('hidden');
            $('start-panel').classList.remove('hidden');
            sfx.init(); 
        }
        function toggleMute() { sfx.toggleMute(); }
        
        function gameOver() {
            gameActive = false; sfx.playGameOver();
            $('final-score').innerText = score;
            
            let rank = "";
            let color = "#fff";
            if (score > 1500) { rank = "🏆 情緒管理大師 (SEL Master)"; color = "#b026ff"; }
            else if (score > 800) { rank = "😎 社會情緒達人 (SEL Expert)"; color = "#00f3ff"; }
            else { rank = "🌱 情緒探索者 (SEL Explorer)"; color = "#888"; }
            
            const rankEl = $('rank-text');
            rankEl.innerText = rank;
            rankEl.style.color = color;

            // 生成統計摘要
            let statsHTML = `<div style="margin-bottom:15px; font-size:0.9rem; color:#aaa; line-height:1.6;">
                初始狀態: ${initialMood === 'happy' ? '😊開心' : initialMood === 'calm' ? '😌平靜' : initialMood === 'tired' ? '😫疲憊' : initialMood === 'anxious' ? '😰焦慮' : '😡生氣'}<br>
                情緒轉化成功: ${stats.transformed} 次<br>
                靜心練習完成: ${stats.mindfulness} 次<br>
                情境決策完成: ${stats.scenarios} 次
            </div>`;
            
            let feedback = "";
            if (stats.transformed > stats.scenarios) feedback = "你非常擅長從壓力中轉化情緒！";
            else if (stats.mindfulness > 0) feedback = "你懂得在焦慮中慢下來，這是很棒的自我管理。";
            else feedback = "持之以恆的練習，能讓你更精準地掌握情緒舵盤！";

            const tip = GAME_DATA.tips[Math.floor(Math.random() * GAME_DATA.tips.length)];
            $('knowledge-tip').innerHTML = statsHTML + `<strong><i class="fas fa-certificate"></i> 專家評語：</strong>${feedback}<br><br>` + tip;
            
            $('game-over-panel').classList.remove('hidden');
            $('top-bar').style.opacity = 0;
            document.body.classList.remove('under-pressure');
        }

        function updateUI() {
            $('scoreDisplay').innerText = score;
            const hearts = Array(lives).fill('<i class="fas fa-heart heart"></i>').join('');
            $('livesDisplay').innerHTML = hearts;
        }

        function gainLifeEffect() {
            const hearts = document.querySelectorAll('.heart');
            if (hearts.length > 0) hearts[hearts.length - 1].classList.add('gained');
        }

        function detectMotion() {
            if (!vid.videoWidth) return;
            tmpCtx.drawImage(vid, 0, 0, CFG.cw, ch);
            const d = tmpCtx.getImageData(0, 0, CFG.cw, ch).data;
            motionPoints = [];
            mCtx.clearRect(0, 0, w, h);
            
            if (prevData) {
                mCtx.fillStyle = "rgba(176, 38, 255, 0.3)";
                for (let y=0; y<ch; y++) {
                    for (let x=0; x<CFG.cw; x++) {
                        const i = (y*CFG.cw+x)*4;
                        const diff = Math.abs((d[i]+d[i+1]+d[i+2])/3 - (prevData[i]+prevData[i+1]+prevData[i+2])/3);
                        if (diff > CFG.thresh) {
                            mCtx.fillRect(x*(w/CFG.cw), y*(h/ch), w/CFG.cw, h/ch);
                            motionPoints.push({x: (CFG.cw-x-1)*(w/CFG.cw), y: y*(h/ch)});
                        }
                    }
                }
            }
            prevData = d;
        }

        let fc = 0;
        function loop() {
            if (!gameActive) return;
            detectMotion(); gCtx.clearRect(0, 0, w, h); fc++;

            // --- 隨機靜心區生成 ---
            if (!mindfulnessZone && !scenarioActive && score > lastMindfulnessScore + 800 && Math.random() < 0.01) {
                mindfulnessZone = new MindfulnessZone();
                lastMindfulnessScore = score;
            }
            if (mindfulnessZone) {
                mindfulnessZone.update();
                mindfulnessZone.draw(gCtx);
                if (mindfulnessZone.completed) {
                    score += 300;
                    stats.mindfulness++;
                    sfx.playSuper();
                    floatingTexts.push(new FloatingText(w/2, h/2, "✨ 心靈淨化 ✨\n+300", "#00ff9d", 45));
                    createExplosion(w/2, h/3, "#00ff9d");
                    mindfulnessZone = null;
                } else if (mindfulnessZone.y > h + 200) { // 這裡只是保險，實際上靜心區通常是固定的
                    mindfulnessZone = null;
                }
            }

            // --- 情境波次觸發 ---
            if (!scenarioActive && score >= nextScenarioScore) {
                triggerScenario();
            }

            // --- 壓力狀態處理 ---
            if (isUnderPressure) {
                pressureTimer--;
                if (pressureTimer <= 0) {
                    isUnderPressure = false;
                    document.body.classList.remove('under-pressure');
                    lives--;
                    sfx.playBad();
                    floatingTexts.push(new FloatingText(w/2, h/2, "壓力過載！\n-1 命", "#ff2a2a", 40));
                    updateUI();
                    if (lives <= 0) gameOver();
                }
            }

            // --- 物品生成 ---
            if (fc % CFG.spawnRate === 0 && !scenarioActive) {
                items.push(new Item());
                if(Math.random()>0.7 && score > 500) items.push(new Item());
                if (fc % 1000 === 0 && CFG.spawnRate > 8) CFG.spawnRate--;
            }

            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i]; it.update(); it.draw(gCtx);
                let hit = false;
                if (!it.active) { items.splice(i,1); continue; }
                
                for (let mp of motionPoints) {
                    if ((it.x-mp.x)**2 + (it.y-mp.y)**2 < CFG.hitRadius**2) { hit = true; break; }
                }
                
                if (hit) {
                    let displayText = "";
                    let fontSize = 30;

                    if (it.type === 'heal') {
                        if (lives < MAX_LIVES) {
                            lives++; gainLifeEffect(); displayText = `${it.text}\n+1命`;
                        } else {
                            score += 50; displayText = `${it.text}\n+50`;
                        }
                        if (isUnderPressure) { 
                            isUnderPressure = false; 
                            document.body.classList.remove('under-pressure');
                            stats.transformed++;
                            displayText = `轉化成功！\n+100`; score += 50;
                        }
                        sfx.playHeal(); fontSize = 32; stats.heals++;
                        floatingTexts.push(new FloatingText(it.x, it.y, displayText, it.color, fontSize));
                    } else if (it.type === 'bad') {
                        lives--; sfx.playBad();
                        displayText = `小心${it.text}!\n-1命`;
                        floatingTexts.push(new FloatingText(it.x, it.y, displayText, '#fff', 30));
                        if (lives<=0) gameOver();
                    } else if (it.type === 'emotion') {
                        isUnderPressure = true;
                        pressureTimer = 300; // 約 5 秒 (60fps)
                        document.body.classList.add('under-pressure');
                        displayText = `${it.text}...\n快找策略轉化！`;
                        sfx.playTone(300, 'sine', 0.2);
                        floatingTexts.push(new FloatingText(it.x, it.y, displayText, it.color, 28));
                    } else if (it.type === 'scenario_ok') {
                        score += it.val; stats.scenarios++;
                        scenarioActive = false; $('scenario-ui').classList.add('hidden');
                        sfx.playSuper(); displayText = `正確決策！\n+${it.val}`;
                        floatingTexts.push(new FloatingText(it.x, it.y, displayText, it.color, 35));
                        items = []; // 清空選項
                        nextScenarioScore += 1000;
                    } else if (it.type === 'scenario_no') {
                        lives += it.val; // -1
                        scenarioActive = false; $('scenario-ui').classList.add('hidden');
                        sfx.playBad(); displayText = `衝動決策！\n-1 命`;
                        floatingTexts.push(new FloatingText(it.x, it.y, displayText, it.color, 35));
                        items = []; // 清空選項
                        nextScenarioScore += 1000;
                        if (lives <= 0) gameOver();
                    } else {
                        score += it.val;
                        if (score >= nextLifeScore && lives < MAX_LIVES) {
                            lives++; gainLifeEffect();
                            floatingTexts.push(new FloatingText(w/2, h/2, "LEVEL UP!\n+1 命", "#00ff9d", 50));
                            sfx.playPowerUp(); nextLifeScore += 1500;
                        }
                        if (it.type==='super') { sfx.playSuper(); fontSize=40; }
                        else if (it.type==='rare') { sfx.playRare(); fontSize=34; }
                        else { sfx.playGood(); fontSize=28; }
                        displayText = `${it.text}\n+${it.val}`;
                        floatingTexts.push(new FloatingText(it.x, it.y, displayText, it.color, fontSize));
                    }
                    createExplosion(it.x, it.y, it.color); updateUI(); items.splice(i, 1);
                }
            }
            particles.forEach((p,i) => { p.update(); p.draw(gCtx); if(p.life<=0) particles.splice(i,1); });
            floatingTexts.forEach((t,i) => { t.update(); t.draw(gCtx); if(t.life<=0) floatingTexts.splice(i,1); });
            animationFrameId = requestAnimationFrame(loop);
        }

        function triggerScenario() {
            scenarioActive = true;
            items = []; // 清除畫面上所有物品
            currentScenario = GAME_DATA.scenarios[Math.floor(Math.random()*GAME_DATA.scenarios.length)];
            
            $('scenario-text').innerText = `情境：${currentScenario.q}`;
            $('scenario-ui').classList.remove('hidden');
            
            // 生成左右兩個選項
            setTimeout(() => {
                items.push(new Item({
                    type: 'scenario_ok', text: currentScenario.ok.t, icon: currentScenario.ok.i,
                    val: currentScenario.ok.v, color: '#00ff9d', speed: CFG.gravity * 0.7, glow: true
                }));
                const okItem = items[items.length-1];
                okItem.x = w * 0.3; okItem.y = -50;
            }, 500);

            setTimeout(() => {
                items.push(new Item({
                    type: 'scenario_no', text: currentScenario.no.t, icon: currentScenario.no.i,
                    val: currentScenario.no.v, color: '#ff2a2a', speed: CFG.gravity * 0.7, glow: false
                }));
                const noItem = items[items.length-1];
                noItem.x = w * 0.7; noItem.y = -50;
            }, 1000);
        }

        function createExplosion(x, y, c) {
            for(let i=0; i<12; i++) particles.push(new Particle(x, y, c));
            gCtx.save(); 
            gCtx.beginPath(); gCtx.strokeStyle=c; gCtx.lineWidth=3; 
            gCtx.arc(x,y,50,0,Math.PI*2); gCtx.stroke(); 
            gCtx.beginPath(); gCtx.strokeStyle="#fff"; gCtx.lineWidth=1; 
            gCtx.arc(x,y,30,0,Math.PI*2); gCtx.stroke();
            gCtx.restore();
        }
    </script>
</body>
